version: '3.8'

services:
  cauvid:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cauvid-pipeline
    volumes:
      - ./configs:/app/configs:ro
      # Mount raw server dataset and prepared dataset separately.
      - ${CAUVID_RAW_DRIVING_DATASET:-/storage-02/ml-jsha/driving-video-with-object-tracking}:/raw_driving_data:ro
      - ${CAUVID_DRIVING_MINI_HOST:-/storage-02/ml-jsha/driving_mini}:/dataset/driving_mini
      - ${CAUVID_NUSCENES_HOST:-/storage-02/ml-jsha/nuScenes}:/dataset/nuScenes
      - ./external:/app/external:ro
      # Mount output directories for results and visualizations
      - ${CAUVID_PIPELINE_OUTPUT_HOST:-/storage-02/ml-jsha/pipeline_output}:/output/pipeline_output
      - ${CAUVID_OUTPUT_HOST:-/storage-02/ml-jsha/output}:/output/output
      # Mount logs directory
      - ${CAUVID_LOGS_HOST:-/storage-02/ml-jsha/logs}:/logs
      # Persist downloaded torchvision model weights across runs
      - ${CAUVID_TORCH_CACHE_HOST:-/storage-02/ml-jsha/.cache/torch}:/.cache/torch
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - MPLBACKEND=Agg
      - TORCH_HOME=/.cache/torch
      - CAUVID_RAW_DRIVING_DATASET=/raw_driving_data
      - CAUVID_DRIVING_MINI_PATH=/dataset/driving_mini
      - CAUVID_NUSCENES_PATH=/dataset/nuScenes
      - CAUVID_PIPELINE_OUTPUT_PATH=/output/pipeline_output
      - CAUVID_OUTPUT_PATH=/output/output
      - CAUVID_PIPELINE_ARGS=${CAUVID_PIPELINE_ARGS:-}
    networks:
      - cauvid-network
    restart: "no"
    command: ["sh", "-c", "python -m src.exp_driving_videos.exp_driving_pipeline $${CAUVID_PIPELINE_ARGS}"]

  # Development service with interactive shell
  cauvid-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cauvid-dev
    volumes:
      # Mount source code for development
      - ./src:/app/src
      - ./configs:/app/configs
      - ${CAUVID_RAW_DRIVING_DATASET:-/storage-02/ml-jsha/driving-video-with-object-tracking}:/raw_driving_data:ro
      - ${CAUVID_DRIVING_MINI_HOST:-/storage-02/ml-jsha/driving_mini}:/dataset/driving_mini
      - ${CAUVID_NUSCENES_HOST:-/storage-02/ml-jsha/nuScenes}:/dataset/nuScenes
      - ./external:/app/external:ro
      - ${CAUVID_PIPELINE_OUTPUT_HOST:-/storage-02/ml-jsha/pipeline_output}:/output/pipeline_output
      - ${CAUVID_OUTPUT_HOST:-/storage-02/ml-jsha/output}:/output/output
      - ${CAUVID_LOGS_HOST:-/storage-02/ml-jsha/logs}:/logs
      - ${CAUVID_TORCH_CACHE_HOST:-/storage-02/ml-jsha/.cache/torch}:/.cache/torch
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=DEBUG
      - MPLBACKEND=Agg
      - TORCH_HOME=/.cache/torch
      - CAUVID_RAW_DRIVING_DATASET=/raw_driving_data
      - CAUVID_DRIVING_MINI_PATH=/dataset/driving_mini
      - CAUVID_NUSCENES_PATH=/dataset/nuScenes
      - CAUVID_PIPELINE_OUTPUT_PATH=/output/pipeline_output
      - CAUVID_OUTPUT_PATH=/output/output
    networks:
      - cauvid-network
    stdin_open: true
    tty: true
    command: ["/bin/bash"]

networks:
  cauvid-network:
    driver: bridge

volumes:
  pipeline_output:
  logs:
