version: '3.8'

services:
  cauvid:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cauvid-pipeline
    volumes:
      # Mount raw server dataset and prepared dataset separately.
      - ${CAUVID_RAW_DRIVING_DATASET:-/home/ml-jsha/storage/CauVid_Data/driving-video-with-object-tracking}:/app/raw_driving_data:ro
      - ${CAUVID_DRIVING_MINI_HOST:-/home/ml-jsha/storage/CauVid_Data/driving_mini}:/app/dataset/driving_mini
      - ./external:/app/external:ro
      # Mount output directories for results and visualizations
      - ${CAUVID_PIPELINE_OUTPUT_HOST:-/home/ml-jsha/storage/CauVid_Data/pipeline_output}:/app/pipeline_output
      - ${CAUVID_OUTPUT_HOST:-/home/ml-jsha/storage/CauVid_Data/output}:/app/output
      # Mount logs directory
      - ${CAUVID_LOGS_HOST:-/home/ml-jsha/storage/CauVid_Data/logs}:/app/logs
      # Persist downloaded torchvision model weights across runs
      - ${CAUVID_TORCH_CACHE_HOST:-/home/ml-jsha/storage/CauVid_Data/.cache/torch}:/app/.cache/torch
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - MPLBACKEND=Agg
      - TORCH_HOME=/app/.cache/torch
      - CAUVID_RAW_DRIVING_DATASET=/app/raw_driving_data
      - CAUVID_DRIVING_MINI_PATH=/app/dataset/driving_mini
      - CAUVID_PIPELINE_OUTPUT_PATH=/app/pipeline_output
      - CAUVID_OUTPUT_PATH=/app/output
    networks:
      - cauvid-network
    restart: "no"
    command: ["python", "-m", "src.exp_driving_videos.pipe_utils.percept2matrix"]

  # Development service with interactive shell
  cauvid-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cauvid-dev
    volumes:
      # Mount source code for development
      - ./src:/app/src
      - ./configs:/app/configs
      - ${CAUVID_RAW_DRIVING_DATASET:-/home/ml-jsha/storage/CauVid_Data/driving-video-with-object-tracking}:/app/raw_driving_data:ro
      - ${CAUVID_DRIVING_MINI_HOST:-/home/ml-jsha/storage/CauVid_Data/driving_mini}:/app/dataset/driving_mini
      - ./external:/app/external:ro
      - ${CAUVID_PIPELINE_OUTPUT_HOST:-/home/ml-jsha/storage/CauVid_Data/pipeline_output}:/app/pipeline_output
      - ${CAUVID_OUTPUT_HOST:-/home/ml-jsha/storage/CauVid_Data/output}:/app/output
      - ${CAUVID_LOGS_HOST:-/home/ml-jsha/storage/CauVid_Data/logs}:/app/logs
      - ${CAUVID_TORCH_CACHE_HOST:-/home/ml-jsha/storage/CauVid_Data/.cache/torch}:/app/.cache/torch
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=DEBUG
      - MPLBACKEND=Agg
      - TORCH_HOME=/app/.cache/torch
      - CAUVID_RAW_DRIVING_DATASET=/app/raw_driving_data
      - CAUVID_DRIVING_MINI_PATH=/app/dataset/driving_mini
      - CAUVID_PIPELINE_OUTPUT_PATH=/app/pipeline_output
      - CAUVID_OUTPUT_PATH=/app/output
    networks:
      - cauvid-network
    stdin_open: true
    tty: true
    command: ["/bin/bash"]

networks:
  cauvid-network:
    driver: bridge

volumes:
  pipeline_output:
  logs:
