dataroot: dataset/nuScenes/v1.0-mini
version: v1.0-mini

dataset_download:
  # Parent directory where nuScenes archives and extracted content are stored.
  # For full dataset on server, set to a mounted persistent path such as
  # /home/your_user/storage/CauVid_Data/nuScenes
  save_root: dataset/nuScenes
  # Ordered download list. Fill in official signed URLs from your nuScenes account.
  # Each entry supports: url, filename (optional), extract (optional), sha256 (optional), extract_to (optional)
  archives: []

# Use scene_names for multiple scenes. A single scene can also be written
# under "scene" and will be treated the same way.
scene_names:
  - scene-0061
  - scene-0103
  - scene-0553
  - scene-0655
  - scene-0757
  - scene-0796
  - scene-0916
  - scene-1077
  - scene-1094
  - scene-1100

max_samples: null
camera: CAM_FRONT
ego_channel: CAM_FRONT

visualize_ego_motion: true
ego_motion_fps: 2.0
include_sweeps: false

output_root: pipeline_output/nuScenes_from_config
force_recompute: true

motion_segment_params:
  forward_stop_threshold_mps: 0.25
  forward_accel_threshold_mps2: 0.5
  lateral_speed_threshold_mps: 0.1
  min_segment_frames: 2
  smoothing_window: 3

# Pattern mining-specific hyperparameters (can be overridden per-run)
pattern_mining:
  min_support: 4
  min_scene_support: 3
